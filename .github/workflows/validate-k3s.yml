# Throwaway workflow: validate that k3s boots on GHA ubuntu-latest.
#
# This workflow is a one-shot feasibility check for the E2E migration.
# It verifies:
#   1. k3s binary installs without systemd (SKIP_START + SKIP_ENABLE)
#   2. k3s server starts in the background on the runner host
#   3. The node becomes Ready within 60 seconds
#   4. containerd can pull/import images
#   5. A privileged pod with hostPID + BPF caps can access /proc and /sys/fs/cgroup
#   6. PSI trigger files exist in the pod's cgroup
#
# DELETE THIS FILE after validation succeeds.
name: Validate K3s on GHA

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  validate_k3s:
    name: K3s Feasibility Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v6

    # ── Step 1: Install k3s binary (no systemd service) ──────────
    - name: Install k3s (skip systemd)
      run: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_SKIP_START=true INSTALL_K3S_SKIP_ENABLE=true sh -
        k3s --version

    # ── Step 2: Start k3s server in background ───────────────────
    - name: Start k3s server
      run: |
        sudo nohup k3s server \
          --disable=traefik \
          --disable=servicelb \
          --write-kubeconfig-mode=644 \
          > /tmp/k3s.log 2>&1 &

        # Phase 1: Wait for the API server to accept connections.
        echo "Waiting for k3s API server..."
        for i in $(seq 1 30); do
          if sudo k3s kubectl get node > /dev/null 2>&1; then
            echo "k3s API server responding after ~$((i * 2))s"
            break
          fi
          sleep 2
        done

        # Phase 2: Wait for the kubelet to register the node.
        # `kubectl wait --all` returns "no matching resources found" when
        # zero nodes exist, so we must poll for node existence first.
        echo "Waiting for node to register..."
        for i in $(seq 1 30); do
          if sudo k3s kubectl get nodes --no-headers 2>/dev/null | grep -q .; then
            echo "Node registered after ~$((i * 2))s"
            break
          fi
          sleep 2
        done

        # Phase 3: Wait for the node to become Ready.
        sudo k3s kubectl wait --for=condition=Ready node --all --timeout=60s
        sudo k3s kubectl get nodes -o wide

    # ── Step 3: Verify containerd and image import ────────────────
    - name: Verify containerd image import
      run: |
        # Build a minimal test image
        echo 'FROM alpine:latest' | docker build -t test-image:local -
        # Import into k3s containerd
        docker save test-image:local | sudo k3s ctr images import -
        # Verify it's visible
        sudo k3s ctr images ls | grep test-image

    # ── Step 4: Deploy a privileged probe pod ─────────────────────
    - name: Deploy probe pod
      run: |
        cat <<'EOF' | sudo k3s kubectl apply -f -
        apiVersion: v1
        kind: Pod
        metadata:
          name: probe
        spec:
          hostPID: true
          containers:
          - name: probe
            image: test-image:local
            imagePullPolicy: Never
            command: ["sleep", "300"]
            securityContext:
              capabilities:
                add: [BPF, PERFMON, SYS_RESOURCE]
              seccompProfile:
                type: Unconfined
            volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: sys-fs-cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
          volumes:
          - name: host-proc
            hostPath:
              path: /proc
          - name: sys-fs-cgroup
            hostPath:
              path: /sys/fs/cgroup
        EOF

        sudo k3s kubectl wait --for=condition=Ready pod/probe --timeout=60s

    # ── Step 5: Verify /proc and cgroup visibility ────────────────
    - name: Verify host visibility from pod
      run: |
        echo "=== Host process visibility (hostPID) ==="
        sudo k3s kubectl exec probe -- ls /host/proc/ | head -20
        echo ""

        echo "=== Cgroup v2 filesystem ==="
        sudo k3s kubectl exec probe -- ls /sys/fs/cgroup/
        echo ""

        echo "=== PSI trigger files ==="
        sudo k3s kubectl exec probe -- cat /sys/fs/cgroup/cpu.pressure || echo "cpu.pressure not found"
        sudo k3s kubectl exec probe -- cat /sys/fs/cgroup/io.pressure || echo "io.pressure not found"
        sudo k3s kubectl exec probe -- cat /sys/fs/cgroup/memory.pressure || echo "memory.pressure not found"
        echo ""

        echo "=== Kernel version ==="
        sudo k3s kubectl exec probe -- uname -r
        echo ""

        echo "=== Runner environment ==="
        uname -r
        cat /proc/version
        echo ""
        echo "=== Cgroup mount info ==="
        mount | grep cgroup
        echo ""
        echo "=== Available memory ==="
        free -h

    # ── Step 6: Dump k3s logs on failure ──────────────────────────
    - name: Dump k3s logs (on failure)
      if: failure()
      run: |
        echo "=== k3s server logs (last 100 lines) ==="
        tail -100 /tmp/k3s.log || true
        echo ""
        echo "=== Node status ==="
        sudo k3s kubectl get nodes -o wide || true
        echo ""
        echo "=== All pods ==="
        sudo k3s kubectl get pods -A -o wide || true

    # ── Cleanup ───────────────────────────────────────────────────
    - name: Cleanup k3s
      if: always()
      run: |
        sudo k3s kubectl delete pod probe --force --grace-period=0 2>/dev/null || true
        sudo killall k3s 2>/dev/null || true
        # k3s-killall.sh is installed by the install script
        sudo /usr/local/bin/k3s-killall.sh 2>/dev/null || true
