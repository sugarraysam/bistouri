name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: clippy, rustfmt

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libelf-dev zlib1g-dev protobuf-compiler

    - name: Check formatting
      run: cargo +nightly fmt --all -- --check

    - name: Clippy (Linting)
      run: cargo +nightly clippy --workspace --all-targets --all-features -- -D warnings

    - name: Build
      run: cargo +nightly build --workspace --verbose --all-targets --all-features

    - name: Run tests
      run: cargo +nightly test --workspace --verbose --all-targets --all-features -- --skip bistouri_e2e

  integration_tests:
    name: E2E Integration Tests
    runs-on: ubuntu-latest
    needs: build_and_test
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: clippy, rustfmt

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Install build dependencies
      run: sudo apt-get update && sudo apt-get install -y libelf-dev zlib1g-dev protobuf-compiler

    - name: Install k3s (skip systemd)
      run: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_SKIP_START=true INSTALL_K3S_SKIP_ENABLE=true sh -
        k3s --version

    - name: Run E2E tests
      run: make -C agent integration-tests
