name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: clippy, rustfmt

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libelf-dev zlib1g-dev

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Clippy (Linting)
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Build
      run: cargo build --verbose --all-targets --all-features

    - name: Run tests
      run: cargo test --verbose --all-targets --all-features

    - name: Build Docker image
      run: DOCKER_BUILDKIT=1 docker build -t bistouri-agent:latest .
