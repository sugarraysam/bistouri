syntax = "proto3";
package bistouri.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// Downstream consumer contract.
//
// Both the E2E test sink and the production symbolizer implement this
// service — the trait is the modularity boundary that makes them
// interchangeable from the agent's perspective.
service CaptureService {
  rpc ReportSession(SessionPayload) returns (google.protobuf.Empty);
}

// ── Session payload ──────────────────────────────────────────────────

message SessionPayload {
  string session_id = 1;
  CaptureSource source = 2;
  Metadata metadata = 3;

  // Deduplicated stack traces with per-trace sample counts.
  // traces[i].on_cpu_count + traces[i].off_cpu_count = samples from trace i.
  repeated CountedTrace traces = 4;

  // Sum of all on_cpu + off_cpu counts across all traces.
  // Validation invariant: consumers SHOULD verify this equals the computed sum.
  // Allows cheap pipeline health checks without iterating traces.
  uint64 total_samples = 5;

  // Capture window duration. Required for computing rates (samples/sec).
  google.protobuf.Duration capture_duration = 6;

  // Sampling period in nanoseconds (1/freq). e.g. 52_631_578 ns for 19 Hz.
  // Enables the symbolizer to reconstruct time-weighted flamegraphs.
  uint64 sample_period_nanos = 7;

  // Deduplicated DSO/binary mapping table. ResolvedFrame.mapping_index
  // references entries in this table, avoiding per-frame build_id repetition.
  repeated Mapping mappings = 8;

  // Multi-tenancy: organizational unit. Set by the agent at startup.
  string tenant_id = 9;

  // Logical service being profiled. Set per-target from TriggerConfig.
  string service_id = 10;

  // Wall-clock time when the capture started.
  // Set by the agent — most accurate source of truth for ClickHouse queries.
  google.protobuf.Timestamp capture_start_time = 11;
}

// ── Metadata ─────────────────────────────────────────────────────────

message Metadata {
  uint32 pid = 1;
  // Field 2 reserved — comm moved to labels["comm"].
  reserved 2;
  reserved "comm";
  KernelMeta kernel_meta = 3;

  // Flexible key-value labels (Prometheus-style).
  // Carries pass-through metadata: comm, hostname, pod, etc.
  // Agents populate these from their environment/config.
  map<string, string> labels = 4;
}

message KernelMeta {
  string release = 1;
  bytes build_id = 2;
  // Runtime virtual address of the kernel's `_text` symbol, read from
  // `/proc/kallsyms`. The symbolizer computes vmlinux-relative offsets as:
  //   vmlinux_vaddr = raw_ip - text_addr + vmlinux_static_text
  // where vmlinux_static_text is the `_text` p_vaddr from the vmlinux ELF.
  fixed64 text_addr = 3;
}

// ── Capture source ───────────────────────────────────────────────────

message CaptureSource {
  oneof source {
    PsiTrigger psi = 1;
  }
}

enum PsiResourceType {
  PSI_RESOURCE_TYPE_UNSPECIFIED = 0;
  PSI_RESOURCE_TYPE_MEMORY = 1;
  PSI_RESOURCE_TYPE_CPU = 2;
  PSI_RESOURCE_TYPE_IO = 3;
}

message PsiTrigger {
  PsiResourceType resource = 1;
}

// ── Stack traces ─────────────────────────────────────────────────────

// A unique stack trace bundled with its sample counts.
// Replaces the fragile parallel-vec pattern (traces[i] ↔ counts[i]).
message CountedTrace {
  StackTrace trace = 1;
  uint64 on_cpu_count = 2;
  uint64 off_cpu_count = 3;
}

message StackTrace {
  // Kernel instruction pointers (raw, KASLR-randomized).
  // Symbolizer uses KernelMeta.text_addr to compute vmlinux-relative addresses.
  repeated fixed64 kernel_frames = 1;

  // User-space frames with build_id-based addressing.
  repeated UserFrame user_frames = 2;
}

message UserFrame {
  oneof frame {
    ResolvedFrame resolved = 1;
    PlaceholderFrame placeholder = 2;
  }
}

// Kernel resolved build_id + file_offset. Ready for symbolization.
// The kernel computed the file offset from the VMA — ASLR is already handled.
// The symbolizer adjusts by (p_vaddr - p_offset) for symbol table lookup.
message ResolvedFrame {
  // Index into SessionPayload.mappings (deduplicated build_id table).
  uint32 mapping_index = 1;
  // File offset within the DSO.
  fixed64 file_offset = 2;
}

// Placeholder for frames the kernel couldn't resolve.
// Preserves call chain structure in flamegraphs.
message PlaceholderFrame {
  // Classification: "vdso", "unknown".
  string label = 1;
  // Raw instruction pointer for diagnostic/correlation.
  fixed64 ip = 2;
}

// ── Mapping table ────────────────────────────────────────────────────

// A memory-mapped object (DSO/binary) identified by its ELF build ID.
// Equivalent to pprof's Mapping message. Stored once per unique build_id
// in SessionPayload.mappings; frames reference entries by index.
message Mapping {
  // ELF build ID (20 bytes, SHA-1). Identifies the DSO/binary.
  bytes build_id = 1;
}
