apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bistouri-agent
  labels:
    app.kubernetes.io/name: bistouri-agent
    app.kubernetes.io/component: agent
rules:
  # The agent watches its own BistouriConfig CR for hot-reloadable trigger configuration.
  # get/list/watch are all required by kube::runtime::watcher (initial list + watch stream).
  - apiGroups: ["bistouri.dev"]
    resources: ["bistouriconfigs"]
    verbs: ["get", "list", "watch"]
