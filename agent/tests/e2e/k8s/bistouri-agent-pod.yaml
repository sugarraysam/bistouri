# Bistouri Pod for E2E integration tests.
#
# Uses a plain Pod instead of a DaemonSet for faster teardown — single-node
# k3s doesn't need DaemonSet scheduling, and Pod deletion is immediate.
#
# Security model: privileged mode for BPF program loading.
apiVersion: v1
kind: Pod
metadata:
  name: bistouri-agent
  labels:
    app: bistouri-agent
spec:
  # Access /proc for all host processes (comm, cgroup discovery).
  hostPID: true
  # Share the host network namespace so that localhost:9500 resolves to
  # the in-process SessionSink running in the E2E test binary.
  hostNetwork: true
  restartPolicy: Always
  terminationGracePeriodSeconds: 5
  containers:
  - name: bistouri-agent
    image: bistouri-agent:local
    imagePullPolicy: Never
    args:
    - "--config"
    - "/etc/bistouri/trigger.yaml"
    - "--proc-path"
    - "/host/proc"
    - "--log-level"
    - "bistouri_agent=debug"
    - "--symbolizer-endpoint"
    - "http://localhost:9500"
    ports:
    - containerPort: 9464
      hostPort: 9464
      name: metrics
      protocol: TCP
    securityContext:
      privileged: true
    volumeMounts:
    - name: host-proc
      mountPath: /host/proc
      readOnly: true
    - name: sys-kernel-tracing
      mountPath: /sys/kernel/tracing
      readOnly: true
      mountPropagation: HostToContainer
    - name: sys-fs-bpf
      mountPath: /sys/fs/bpf
      mountPropagation: Bidirectional
    - name: sys-fs-cgroup
      mountPath: /sys/fs/cgroup
      mountPropagation: HostToContainer
    - name: config
      mountPath: /etc/bistouri
  volumes:
  - name: host-proc
    hostPath:
      path: /proc
  - name: sys-kernel-tracing
    hostPath:
      path: /sys/kernel/tracing
  - name: sys-fs-bpf
    hostPath:
      path: /sys/fs/bpf
  - name: sys-fs-cgroup
    hostPath:
      path: /sys/fs/cgroup
  - name: config
    configMap:
      name: bistouri-config
