# Stress workload pods for Bistouri E2E integration tests.
#
# Each pod runs a single stress binary with resource limits designed to
# create targeted PSI pressure on exactly one resource type.
# The pressure comes from tight cgroup limits, not workload intensity.

# ── cpu-burner ──────────────────────────────────────────────────────
# Tight CPU limit (100m = 0.1 cores) causes the cgroup CPU throttler
# to stall the process, generating cpu.pressure.
apiVersion: v1
kind: Pod
metadata:
  name: cpu-stress
  labels:
    app: stress
    type: cpu
spec:
  restartPolicy: Never
  containers:
  - name: burner
    image: bistouri-stress:local
    imagePullPolicy: Never
    command: ["/cpu-burner"]
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "64Mi"

---
# ── io-burner ──────────────────────────────────────────────────────
# IO bandwidth limit via cgroupv2 io.max causes the kernel to throttle
# writes, generating io.pressure.
#
# Kubernetes has no native IO resource limits. A privileged init
# container writes io.max to the pod-level cgroup before the burner
# starts. Pod-level limits propagate to all child container cgroups.
#
# The io.max step is best-effort: if no real block device can be found
# (e.g. k3s backed by tmpfs where /etc/hosts has device major=0), the
# init container exits cleanly and the burner still runs. The
# io-burner generates io.pressure through 4 MB fdatasync() bursts
# regardless of whether throttling is active.
apiVersion: v1
kind: Pod
metadata:
  name: io-stress
  labels:
    app: stress
    type: io
spec:
  restartPolicy: Never
  initContainers:
  - name: io-throttle
    image: busybox:latest
    imagePullPolicy: IfNotPresent
    securityContext:
      privileged: true
    env:
    - name: POD_UID
      valueFrom:
        fieldRef:
          fieldPath: metadata.uid
    command:
    - /bin/sh
    - -c
    - |
      # NOTE: deliberately no "set -e" — io.max throttling is best-effort.
      # The burner generates io.pressure through write volume alone; throttling
      # amplifies pressure but is not required for the PSI trigger to fire.

      # 1. Find the first real block device (major > 0) from mountinfo.
      #
      # We cannot probe /etc/hosts: in k3s it is bind-mounted from a tmpfs
      # (device major=0). The kernel's block IO controller rejects major=0 in
      # io.max. Previously this crashed the init container (under set -e),
      # preventing the burner from ever starting and producing zero sessions.
      #
      # Scan ALL mountinfo entries and pick the first with a non-zero major.
      DEV=$(awk '{
        split($3, d, ":");
        if (d[1]+0 > 0) { print $3; exit }
      }' /proc/self/mountinfo)

      if [ -z "$DEV" ]; then
        echo "WARNING: no real block device found in mountinfo — skipping io.max" >&2
        echo "io.pressure will be generated by write volume alone"
        exit 0
      fi
      echo "Resolved block device: ${DEV}"

      # 2. Resolve partition → whole disk (io.max must target the disk).
      if [ -f "/sys/dev/block/${DEV}/partition" ]; then
        PARENT_DEV=$(cat "/sys/dev/block/${DEV}/../dev")
        echo "Device ${DEV} is a partition — resolved to parent disk: ${PARENT_DEV}"
        DEV=$PARENT_DEV
      else
        echo "Device ${DEV} is a whole disk"
      fi

      # 3. Discover pod-level cgroup via the Downward API Pod UID.
      # cgroupns hides the true host path; we search the host cgroup tree.
      POD_UID_UNDERSCORES=$(echo "$POD_UID" | tr '-' '_')
      # Alphabetical sort: parent (Pod) cgroup sorts before child (container) cgroups.
      POD_CG=$(find /sys/fs/cgroup -type d | grep -e "${POD_UID}" -e "${POD_UID_UNDERSCORES}" | sort | head -n 1)
      if [ -z "$POD_CG" ]; then
        echo "WARNING: pod cgroup not found — skipping io.max" >&2
        exit 0
      fi
      echo "Found pod cgroup: ${POD_CG}"

      # 4. Apply IO throttle (best-effort).
      # 16 MB/s: tight enough to accumulate io.pressure stall time while
      # still leaving the burner on-CPU long enough for perf_event sampling.
      if echo "${DEV} rbps=16777216 wbps=16777216" > "${POD_CG}/io.max"; then
        echo "Successfully applied io.max throttle:"
        cat "${POD_CG}/io.max"
      else
        echo "WARNING: io.max write rejected (device=${DEV}) — continuing without throttle" >&2
      fi

    volumeMounts:
    - name: sys-fs-cgroup
      mountPath: /sys/fs/cgroup
  containers:
  - name: burner
    image: bistouri-stress:local
    imagePullPolicy: Never
    command: ["/io-burner"]
    resources:
      requests:
        cpu: "500m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "64Mi"
  volumes:
  - name: sys-fs-cgroup
    hostPath:
      path: /sys/fs/cgroup

---
# ── mem-burner ─────────────────────────────────────────────────────
# Tight memory limit (64Mi) forces the kernel to aggressively reclaim
# pages as the workload evicts and re-faults a 40 MB arena via
# MADV_PAGEOUT, generating memory.pressure.
apiVersion: v1
kind: Pod
metadata:
  name: mem-stress
  labels:
    app: stress
    type: memory
spec:
  restartPolicy: Never
  containers:
  - name: burner
    image: bistouri-stress:local
    imagePullPolicy: Never
    command: ["/mem-burner"]
    resources:
      requests:
        cpu: "500m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "64Mi"
