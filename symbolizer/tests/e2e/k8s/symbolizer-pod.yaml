# Bistouri Symbolizer pod for E2E integration tests.
#
# Two containers:
#   1. symbolizer — gRPC server (LogSink), assertions via kubectl logs
#   2. debuginfod — indexes fixture ELFs + host kernel debuginfo locally,
#      federates upstream for distro packages
#
# hostNetwork: true so the test harness on the host can reach the
# symbolizer's gRPC port directly on localhost.
#
# NOTE: /host-debug is mounted read-only from the host's full
# /usr/lib/debug directory. The debuginfod command targets only
# the boot/ subdirectory. Multiple vmlinux files (~450 MB each)
# live there; scanning is unavoidably slow but completes within
# ~120 seconds.

apiVersion: v1
kind: Pod
metadata:
  name: bistouri-symbolizer
  labels:
    app: bistouri-symbolizer
spec:
  hostNetwork: true
  restartPolicy: Never
  terminationGracePeriodSeconds: 5
  containers:
  - name: symbolizer
    image: bistouri-symbolizer:local
    imagePullPolicy: Never
    args:
    - "--log-level"
    - "bistouri_symbolizer=debug"
    - "--listen-addr=0.0.0.0:50051"
    - "--debuginfod-url=http://localhost:8002"
    - "--user-object-budget-bytes=67108864"
    - "--kernel-object-budget-bytes=134217728"
    - "--negative-cache-entries=128"
    - "--metrics-port=9091"
    ports:
    - containerPort: 50051
      hostPort: 50051
      name: grpc
      protocol: TCP
    - containerPort: 9091
      hostPort: 9091
      name: metrics
      protocol: TCP
  - name: debuginfod
    image: debuginfod-fixtures:local
    imagePullPolicy: Never
    # Scan baked-in fixtures AND the host kernel's debug symbols.
    # -F: recursive file scan.  -t 0: foreground scan, no rescans.
    command: ["debuginfod", "-F", "-t", "0", "-vvv", "/fixtures", "/host-debug"]
    ports:
    - containerPort: 8002
      name: debuginfod
      protocol: TCP
    volumeMounts:
    - name: debuginfod-cache
      mountPath: /root/.debuginfod_client
    - name: host-debug
      mountPath: /host-debug
      readOnly: true
  volumes:
  - name: debuginfod-cache
    emptyDir: {}
  - name: host-debug
    hostPath:
      path: /usr/lib/debug/boot
      type: DirectoryOrCreate
