project:
  type: book
  output-dir: _book

book:
  title: "Bistouri — Building an eBPF Profiler"
  chapters:
    - index.qmd
    - trigger.qmd
    - profiler.qmd
    - ebpf.qmd
    - symbolizer.qmd

format:
  html:
    theme:
      - flatly
      - custom.scss
    toc: true
    toc-depth: 3
    code-copy: true
    code-block-bg: true
    code-block-border-left: "#6c5ce7"
    highlight-style: github
    mainfont: "Inter, system-ui, -apple-system, sans-serif"
    monofont: "JetBrains Mono, Fira Code, monospace"
    mermaid:
      theme: default
